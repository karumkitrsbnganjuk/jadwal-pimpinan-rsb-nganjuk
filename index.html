<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Pimpinan Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <script>
        // Kunci mainan database kamu sudah Kakak masukkan di sini ya!
        const SUPABASE_URL = 'https://mqgypupqjwdwzogttfqp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_xeUqmSwj1_pFZdn7yd1ADQ_cht0mYy_sb';
        
        // Menghubungkan ke database cloud
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>

    <div class="max-w-3xl mx-auto p-4 sm:p-6 lg:p-8 space-y-8">
        
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-1.5">
                    📅 Rencana Jadwal Seminggu Ke Depan
                </h2>
                <span id="infoStatus" class="text-[11px] font-medium bg-emerald-50 text-emerald-700 px-2.5 py-1 rounded-full border border-emerald-100">
                    Menghubungkan...
                </span>
            </div>

            <div id="listJadwalSeminggu" class="space-y-3">
                <div class="text-center py-8 text-gray-400 text-sm bg-white rounded-xl border border-gray-100 shadow-2xs">
                    Memuat data jadwal terdekat...
                </div>
            </div>
        </div>

        <hr class="border-gray-200">

        <div class="bg-white p-5 rounded-2xl shadow-xs border border-gray-100">
            <div class="mb-4">
                <h3 class="text-base font-bold text-slate-800">➕ Input Agenda Baru</h3>
                <p class="text-xs text-gray-400">Tulis di sini, nanti otomatis muncul di layar HP bagian atas!</p>
            </div>
            
            <form id="formAgenda" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Nama Kegiatan / Acara</label>
                    <input type="text" id="judul" required placeholder="Contoh: Rapat Koordinasi" class="w-full px-3 py-2 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Tanggal</label>
                        <input type="date" id="tanggal" required class="w-full px-3 py-2 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Jam Berangkat</label>
                        <input type="time" id="jam" required class="w-full px-3 py-2 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Lokasi / Tempat</label>
                    <input type="text" id="lokasi" required placeholder="Contoh: Ruang Pertemuan Utama" class="w-full px-3 py-2 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
                </div>

                <button type="submit" id="btnSimpan" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2.5 rounded-xl transition text-sm cursor-pointer shadow-xs">
                    Simpan & Update Jadwal HP 🚀
                </button>
            </form>
        </div>

    </div>

    <script>
        let dataAgenda = [];
        const form = document.getElementById('formAgenda');
        const btnSimpan = document.getElementById('btnSimpan');

        async function ambilDataDariCloud() {
            document.getElementById('infoStatus').innerText = "Sinkronisasi...";
            document.getElementById('infoStatus').className = "text-[11px] font-medium bg-amber-50 text-amber-700 px-2.5 py-1 rounded-full border border-amber-100";
            
            let { data, error } = await supabaseClient
                .from('agenda_pimpinan')
                .select('*')
                .order('tanggal', { ascending: true })
                .order('jam', { ascending: true });

            if (error) {
                console.error("Gagal mengambil data:", error);
                document.getElementById('infoStatus').innerText = "Gagal Sinkron";
                document.getElementById('infoStatus').className = "text-[11px] font-medium bg-red-50 text-red-700 px-2.5 py-1 rounded-full border border-red-100";
                return;
            }

            dataAgenda = data;
            renderJadwalSeminggu();
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            btnSimpan.innerText = "Mengirim ke HP...";
            btnSimpan.disabled = true;
            
            const agendaBaru = {
                judul: document.getElementById('judul').value,
                tanggal: document.getElementById('tanggal').value,
                jam: document.getElementById('jam').value,
                lokasi: document.getElementById('lokasi').value
            };

            const { error } = await supabaseClient
                .from('agenda_pimpinan')
                .insert([agendaBaru]);

            if (error) {
                alert("Gagal menyimpan data!");
                console.error(error);
            } else {
                form.reset();
                await ambilDataDariCloud();
                window.scrollTo({ top: 0, behavior: 'smooth' }); // Layar otomatis naik ke atas setelah sukses simpan
            }

            btnSimpan.innerText = "Simpan & Update Jadwal HP 🚀";
            btnSimpan.disabled = false;
        });

        async function hapusJadwal(id) {
            if (confirm("Hapus agenda ini secara permanen?")) {
                const { error } = await supabaseClient
                    .from('agenda_pimpinan')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert("Gagal menghapus data!");
                } else {
                    await ambilDataDariCloud();
                }
            }
        }

        function renderJadwalSeminggu() {
            const wadahList = document.getElementById('listJadwalSeminggu');
            const infoStatus = document.getElementById('infoStatus');
            wadahList.innerHTML = '';

            const hariIni = new Date();
            hariIni.setHours(0,0,0,0);

            const tujuhHariLagi = new Date();
            tujuhHariLagi.setDate(hariIni.getDate() + 7);
            tujuhHariLagi.setHours(23,59,59,999);

            let dataTampil = dataAgenda.filter(item => {
                const tglAgenda = new Date(item.tanggal);
                return tglAgenda >= hariIni && tglAgenda <= tujuhHariLagi;
            });

            infoStatus.innerText = "Tersinkron (Cloud)";
            infoStatus.className = "text-[11px] font-medium bg-emerald-50 text-emerald-700 px-2.5 py-1 rounded-full border border-emerald-100";

            if (dataTampil.length === 0) {
                wadahList.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-2xl border border-dashed border-gray-200 text-gray-400 text-sm">
                        📭 Aman! Tidak ada agenda pimpinan dalam 7 hari ke depan.
                    </div>
                `;
                return;
            }

            dataTampil.forEach(item => {
                const opsiFormat = { weekday: 'long', day: 'numeric', month: 'short' };
                const tglCantik = new Date(item.tanggal).toLocaleDateString('id-ID', opsiFormat);
                const jamMenit = item.jam.substring(0, 5);

                wadahList.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-2xs flex items-center justify-between hover:border-gray-200 transition group">
                        <div class="space-y-1">
                            <div class="flex items-center gap-2">
                                <span class="bg-slate-900 text-white text-[10px] font-bold px-2 py-0.5 rounded-md">${jamMenit}</span>
                                <h3 class="font-semibold text-slate-800 text-sm sm:text-base">${item.judul}</h3>
                            </div>
                            <p class="text-xs text-gray-500 flex items-center gap-1">
                                📅 ${tglCantik} &nbsp;•&nbsp; 📍 ${item.lokasi}
                            </p>
                        </div>
                        <button onclick="hapusJadwal(${item.id})" class="text-gray-300 hover:text-red-500 text-xs p-2 rounded-lg hover:bg-red-50 transition cursor-pointer opacity-0 group-hover:opacity-100 focus:opacity-100">
                            Hapus
                        </button>
                    </div>
                `;
            });
        }

        ambilDataDariCloud();
    </script>
</body>
</html>
